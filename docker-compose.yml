

services:

  springboot:
    image: ghcr.io/riyabhunia2024-tech/spring-boot:latest
    container_name: springboot
    ports:
      - "8080:8080"

  nginx:
    image: nginx:latest
    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - springboot