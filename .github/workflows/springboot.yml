name: Build and Push Image

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: ghcr.io/riyabhunia2024-tech/my-springboot-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
# 
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
# 
    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            sudo docker pull ghcr.io/riyabhunia2024-tech/my-springboot-app:latest
            sudo docker stop springboot-app || true
            sudo docker rm springboot-app || true
            sudo docker run -d -p 8080:80 --name springboot-app ghcr.io/riyabhunia2024-tech/my-springboot-app:latest