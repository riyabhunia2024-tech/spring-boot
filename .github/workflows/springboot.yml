name: Build, Push & Deploy Spring Boot

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build Spring Boot
        run: mvn clean package -DskipTests

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/riyabhunia2024-tech/spring-boot:latest .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/riyabhunia2024-tech/spring-boot:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u riyabhunia2024-tech --password-stdin

            docker pull ghcr.io/riyabhunia2024-tech/spring-boot:latest

            docker stop springboot || true
            docker rm springboot || true

            docker run -d \
              --name springboot \
              --restart unless-stopped \
              -p 8080:8080 \
              ghcr.io/riyabhunia2024-tech/spring-boot:latest